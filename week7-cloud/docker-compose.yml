# Week 7 — Docker Compose: Cloud Multi-Container
# แสดง Cloud Architecture: nginx + app + volume

version: '3.8'

services:

  # Nginx — Reverse Proxy / Load Balancer
  nginx:
    image: nginx:alpine
    container_name: taskboard-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  # App Server (scale ได้: docker-compose up --scale app=2)
  app:
    build: .
    volumes:
      - taskboard-data:/app/database
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  taskboard-data:
    name: taskboard-cloud-data
