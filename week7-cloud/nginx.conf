# nginx.conf — Reverse Proxy + Load Balancer
# Week 7: Cloud Architecture

upstream taskboard_app {
    # Docker Compose ตั้งชื่อ service ว่า "app"
    # ถ้า scale app=2 nginx จะ round-robin ให้อัตโนมัติ
    server app:3003;
}

server {
    listen 80;
    server_name localhost;

    # Proxy ทุก request ไปยัง app container
    location / {
        proxy_pass         http://taskboard_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint
    location /nginx-health {
        return 200 'nginx ok\n';
        add_header Content-Type text/plain;
    }
}
